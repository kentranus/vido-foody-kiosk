<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FFCC00" />
    <title>Vido Foody</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23FFE066'/><stop offset='1' stop-color='%23FFCC00'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='72' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='62' font-weight='900' fill='white'>F</text></svg>" />
    <style>
      :root {
        --bg: #0F1419; --panel: #1A1F26; --card: #252A33;
        --cardHover: #2D333D; --border: #374151;
        --text: #FFFFFF; --textMute: #9CA3AF; --textDim: #6B7280;
        --primary: #FFCC00; --primaryD: #E0B000;
        --primaryA: rgba(255,204,0,0.18);
        --accent: #FFE066;
        --primaryG: linear-gradient(135deg, #FFE066 0%, #FFCC00 45%, #FF9500 100%);
        --primaryGShadow: 0 4px 16px rgba(255,165,0,0.45);
        --yellow: #FCD34D; --red: #EF4444; --redA: rgba(239,68,68,0.15);
        --blue: #3B82F6; --cyan: #2DD4BF; --cyanD: #14A89A;
        --green: #4ADE80;
        --shadow: rgba(0,0,0,0.4); --overlay: rgba(0,0,0,0.7);
      }
      html, body, #root {
        margin: 0; padding: 0; height: 100%;
        background: var(--bg); color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        transition: background-color 0.2s ease, color 0.2s ease;
      }
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      button { font-family: inherit; }
      input, select, textarea { font-family: inherit; }
    </style>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('vido_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', saved);
          if (saved === 'light') {
            var r = document.documentElement;
            r.style.setProperty('--bg', '#FFFEF7');
            r.style.setProperty('--panel', '#FFFFFF');
            r.style.setProperty('--card', '#FFF8DC');
            r.style.setProperty('--cardHover', '#FFF0B3');
            r.style.setProperty('--border', '#FFE680');
            r.style.setProperty('--text', '#1F2937');
            r.style.setProperty('--textMute', '#6B7280');
            r.style.setProperty('--textDim', '#9CA3AF');
            r.style.setProperty('--primary', '#FFCC00');
            r.style.setProperty('--primaryD', '#E0B000');
            r.style.setProperty('--primaryA', 'rgba(255,204,0,0.20)');
            r.style.setProperty('--accent', '#FFE066');
            r.style.setProperty('--primaryG', 'linear-gradient(135deg, #FFE066 0%, #FFCC00 45%, #FF9500 100%)');
            r.style.setProperty('--primaryGShadow', '0 4px 16px rgba(255,165,0,0.35)');
            r.style.setProperty('--yellow', '#EAB308');
            r.style.setProperty('--red', '#DC2626');
            r.style.setProperty('--redA', 'rgba(220,38,38,0.10)');
            r.style.setProperty('--blue', '#2563EB');
            r.style.setProperty('--cyan', '#0891B2');
            r.style.setProperty('--cyanD', '#0E7490');
            r.style.setProperty('--green', '#16A34A');
            r.style.setProperty('--shadow', 'rgba(0,0,0,0.10)');
            r.style.setProperty('--overlay', 'rgba(0,0,0,0.5)');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
