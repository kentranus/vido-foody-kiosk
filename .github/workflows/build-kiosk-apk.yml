name: Build Vido Foody Kiosk APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-kiosk-apk:
    name: Build Kiosk APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Flutter platform files if needed
        working-directory: vido-foody-kiosk
        run: flutter create .

      - name: Remove generated sample test
        working-directory: vido-foody-kiosk
        run: rm -f test/widget_test.dart

      - name: Use Gradle 8.7 for current Flutter
        working-directory: vido-foody-kiosk
        run: |
          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's#gradle-[0-9.]*-all.zip#gradle-8.7-all.zip#g' android/gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Use Android Gradle Plugin 8.6 for current Flutter
        working-directory: vido-foody-kiosk
        run: |
          if [ -f android/settings.gradle.kts ]; then
            sed -i 's/id("com.android.application") version "[0-9.]*"/id("com.android.application") version "8.6.0"/g' android/settings.gradle.kts
          fi
          if [ -f android/settings.gradle ]; then
            sed -i "s/id 'com.android.application' version '[0-9.]*'/id 'com.android.application' version '8.6.0'/g" android/settings.gradle
          fi

      - name: Install Flutter dependencies
        working-directory: vido-foody-kiosk
        run: flutter pub get

      - name: Analyze Flutter kiosk app
        working-directory: vido-foody-kiosk
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Android Kiosk APK
        working-directory: vido-foody-kiosk
        run: flutter build apk --debug

      - name: Upload Kiosk APK
        uses: actions/upload-artifact@v6
        with:
          name: vido-foody-kiosk-debug-apk
          path: vido-foody-kiosk/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
